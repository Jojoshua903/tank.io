<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Arena</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='30' y='12' width='12' height='28' rx='2' fill='%23999'/><circle cx='32' cy='36' r='18' fill='%2300b2e1' stroke='%23008fae' stroke-width='3'/></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #cdcdcd; font-family: 'Segoe UI', Ubuntu, sans-serif; }
canvas { display: block; }

#menu {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
  color: #fff;
}
#menu h1 { font-size: 64px; margin-bottom: 8px; text-shadow: 3px 3px 0 rgba(0,0,0,.3); letter-spacing: 2px; }
#menu .sub { font-size: 18px; opacity: .7; margin-bottom: 32px; }
#nameInput {
  width: 280px; padding: 12px 16px; font-size: 18px; border: none; border-radius: 8px;
  text-align: center; margin-bottom: 24px; outline: none;
}
#playBtn {
  padding: 14px 48px; font-size: 22px; font-weight: 700; border: none; border-radius: 8px;
  background: #e74c3c; color: #fff; cursor: pointer; transition: transform .1s;
}
#playBtn:hover { transform: scale(1.05); }
#playBtn:active { transform: scale(.97); }

#upgradePanel {
  position: fixed; bottom: 60px; left: 12px; z-index: 50;
  display: none; flex-direction: column; gap: 4px;
}
.stat-row {
  display: flex; align-items: center; gap: 6px; font-size: 13px; color: #333;
}
.stat-row .label { width: 100px; text-align: right; font-weight: 600; }
.stat-bar { display: flex; gap: 2px; }
.stat-pip { width: 14px; height: 14px; border-radius: 3px; background: #888; opacity: .3; }
.stat-pip.filled { background: #f1c40f; opacity: 1; }
.stat-btn {
  width: 22px; height: 22px; border: none; border-radius: 4px;
  background: #27ae60; color: #fff; font-weight: 700; font-size: 14px;
  cursor: pointer; line-height: 22px; text-align: center;
}
.stat-btn:hover { background: #2ecc71; }
.stat-btn.disabled { background: #999; cursor: default; }

#classPanel {
  position: fixed; bottom: 60px; right: 12px; z-index: 50;
  display: none; flex-direction: column; gap: 4px; align-items: flex-end;
}
.class-btn {
  padding: 6px 14px; font-size: 13px; font-weight: 600; border: none;
  border-radius: 6px; cursor: pointer; background: #3498db; color: #fff;
  transition: transform .1s;
}
.class-btn:hover { transform: scale(1.05); background: #2980b9; }

#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 40;
  display: none; padding: 10px 16px; pointer-events: none;
}
#hud .name-tag { font-size: 16px; font-weight: 700; color: #333; }
#hud .level-tag { font-size: 14px; color: #555; margin-left: 8px; }
.xp-bar-outer {
  margin-top: 6px; width: 320px; height: 16px; background: rgba(0,0,0,.15);
  border-radius: 8px; overflow: hidden;
}
.xp-bar-inner { height: 100%; background: #f1c40f; transition: width .2s; width: 0%; }
#scoreDisplay { position: fixed; top: 10px; right: 16px; z-index: 40; font-size: 18px; font-weight: 700; color: #333; display: none; }
#classLabel { position: fixed; top: 34px; right: 16px; z-index: 40; font-size: 14px; color: #555; display: none; }
#minimap {
  position: fixed; bottom: 60px; right: 12px; z-index: 45;
  width: 140px; height: 140px; background: rgba(200,200,200,.6);
  border: 2px solid rgba(0,0,0,.2); display: none;
}

#deathScreen {
  position: fixed; inset: 0; z-index: 200; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,.65); color: #fff;
}
#deathScreen h2 { font-size: 48px; margin-bottom: 8px; }
#finalScore { font-size: 24px; margin-bottom: 24px; opacity: .8; }
#respawnBtn {
  padding: 12px 40px; font-size: 20px; font-weight: 700; border: none;
  border-radius: 8px; background: #e74c3c; color: #fff; cursor: pointer;
}

@media print {
  body { background: #fff; }
  #menu, #hud, #upgradePanel, #classPanel, #minimap, #deathScreen, #scoreDisplay, #classLabel { display: none !important; }
}
</style>

  <button id="playBtn">PLAY</button>

// ==================== FOOD ====================
function spawnInitialFood() {
  for(let i = 0; i < 280; i++) spawnFood();

function spawnFood() {
  const r = Math.random();
  let type, hp, xp, size;
  if(r < 0.55) { type = 'square'; hp = 10; xp = 10; size = 12; }
  else if(r < 0.82) { type = 'triangle'; hp = 25; xp = 25; size = 14; }
  else if(r < 0.95) { type = 'pentagon'; hp = 100; xp = 130; size = 22; }
  else { type = 'hexagon'; hp = 250; xp = 400; size = 30; }
  foods.push({
    x: Math.random() * WORLD_W, y: Math.random() * WORLD_H,
    vx: 0, vy: 0, type, hp, maxHp: hp, xp, size,
    angle: Math.random() * Math.PI * 2, spin: (Math.random()-0.5)*0.01,
  });
}

// ==================== ENEMIES (AI) ====================
function spawnInitialEnemies() {
  for(let i = 0; i < 18; i++) spawnEnemy();
}
function spawnEnemy() {
  const tierKeys = Object.keys(TANK_CLASSES);
  const classId = tierKeys[Math.floor(Math.random() * tierKeys.length)];
  const cls = TANK_CLASSES[classId];
  const level = Math.min(MAX_LEVEL, Math.max(1, (cls.tier + 1) * 8 + Math.floor(Math.random()*12)));
  const hpMult = 1 + level * 0.08;
  const e = {
    x: Math.random() * WORLD_W, y: Math.random() * WORLD_H,
    vx: 0, vy: 0, angle: Math.random() * Math.PI * 2,
    classId, level, hp: cls.maxHp * hpMult, maxHp: cls.maxHp * hpMult,
    name: randomName(), reloadTimers: cls.barrels.map(() => 0),
    target: null, aiTimer: 0, wanderAngle: Math.random() * Math.PI * 2,
    drones: [], invuln: 0,
    statMults: { speed: 1 + Math.random()*0.3, damage: 1 + Math.random()*0.3, reload: 1 - Math.random()*0.2 },
  };
  enemies.push(e);
}
const AI_NAMES = ['Alpha','Bravo','Charlie','Delta','Echo','Foxtrot','Ghost','Hunter','Icarus','Jinx','Karma','Luna','Maverick','Nova','Omega','Phoenix','Quake','Raptor','Shadow','Titan','Ultra','Viper','Wraith','Xeno','Yeti','Zenith'];
function randomName() { return AI_NAMES[Math.floor(Math.random()*AI_NAMES.length)]; }

// ==================== UI BUILDERS ====================
function buildUpgradeUI() {
  const panel = document.getElementById('upgradePanel');
  panel.innerHTML = '';
  STAT_NAMES.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = `<span class="label">${name}</span><div class="stat-bar" id="bar${i}"></div><button class="stat-btn" id="sbtn${i}">+</button>`;
    panel.appendChild(row);
    document.getElementById(`sbtn${i}`).onclick = () => {
      if(statPoints > 0 && stats[i] < MAX_STAT) { stats[i]++; statPoints--; updateStatUI(); }
    };
  });
  updateStatUI();
}
function updateStatUI() {
  STAT_NAMES.forEach((_, i) => {
    const bar = document.getElementById(`bar${i}`);
    bar.innerHTML = '';
    for(let j = 0; j < MAX_STAT; j++) {
      const pip = document.createElement('div');
      pip.className = 'stat-pip' + (j < stats[i] ? ' filled' : '');
      bar.appendChild(pip);
    }
    const btn = document.getElementById(`sbtn${i}`);
    btn.className = 'stat-btn' + (statPoints <= 0 || stats[i] >= MAX_STAT ? ' disabled' : '');
  });
  document.getElementById('hudLevel').textContent = `Lv ${player.level} | ${statPoints} pts`;
}
function buildClassUI() {
  const panel = document.getElementById('classPanel');
  panel.innerHTML = '';
  panel.style.display = 'none';
  const cls = TANK_CLASSES[player.classId];
  if(!cls.upgrades || cls.upgrades.length === 0) return;
  const tier = cls.tier;
  const neededLevel = UPGRADE_LEVELS[tier] || 999;
  if(player.level < neededLevel) return;
  panel.style.display = 'flex';
  cls.upgrades.forEach(uid => {
    const ucls = TANK_CLASSES[uid];
    if(!ucls) return;
    const btn = document.createElement('button');
    btn.className = 'class-btn';
    btn.textContent = ucls.name;
    btn.onclick = () => upgradeClass(uid);
    panel.appendChild(btn);
  });
}
function upgradeClass(id) {
  player.classId = id;
  const cls = TANK_CLASSES[id];
  player.reloadTimers = cls.barrels.map(() => 0);
  player.maxHp = cls.maxHp + stats[1]*12;
  player.hp = player.maxHp;
  player.drones = [];
  buildClassUI();
  document.getElementById('classLabel').textContent = cls.name;
}

// ==================== STAT HELPERS ====================
function getStatMult(statIdx, val) {
  if(val === undefined) val = stats[statIdx];
  const m = [
    0.012, // hp regen
    12,    // max hp per point
    0.12,  // body damage
    0.8,   // bullet speed
    1.2,   // bullet pen
    1.0,   // bullet damage
    -0.06, // reload (negative = faster)
    0.08,  // move speed
  ];
  return val * m[statIdx];
}

// ==================== PARTICLES ====================
function addParticle(x, y, color) {
  for(let i=0;i<4;i++) {
    particles.push({
      x, y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4,
      life: 20 + Math.random()*15, maxLife: 35, size: 3+Math.random()*4, color
    });
  }
}

// ==================== MAIN LOOP ====================
function gameLoop() {
  requestAnimationFrame(gameLoop);
  if(!playing) return;
  tick++;
  updatePlayer();
  updateEnemies();
  updateBullets();
  updateFoods();
  updateParticles();
  checkCollisions();
  maintainPopulation();
  updateCamera();
  draw();
  drawMinimap();
  updateHUD();
}

// ==================== PLAYER UPDATE ====================
function updatePlayer() {
  if(player.invuln > 0) player.invuln--;
  const cls = TANK_CLASSES[player.classId];
  const spd = (cls.speed + getStatMult(7)) * 2.2;

  let mx = 0, my = 0;
  if(keys['w'] || keys['arrowup']) my -= 1;
  if(keys['s'] || keys['arrowdown']) my += 1;
  if(keys['a'] || keys['arrowleft']) mx -= 1;
  if(keys['d'] || keys['arrowright']) mx += 1;
  const len = Math.sqrt(mx*mx+my*my);
  if(len > 0) { mx /= len; my /= len; }
  player.vx += mx * spd * 0.15;
  player.vy += my * spd * 0.15;
  player.vx *= 0.88;
  player.vy *= 0.88;
  player.x += player.vx;
  player.y += player.vy;
  player.x = Math.max(cls.bodySize, Math.min(WORLD_W - cls.bodySize, player.x));
  player.y = Math.max(cls.bodySize, Math.min(WORLD_H - cls.bodySize, player.y));

  // Aim at mouse
  const wx = camera.x + (mouse.x - W/2) / camera.zoom;
  const wy = camera.y + (mouse.y - H/2) / camera.zoom;
  player.angle = Math.atan2(wy - player.y, wx - player.x);

  // HP regen
  const regen = cls.hpRegen + getStatMult(0);
  player.hp = Math.min(player.maxHp, player.hp + regen);

  // Fire
  if(mouse.down || keys[' ']) {
    fireTank(player, cls, stats, null);
  }
  cls.barrels.forEach((b, i) => { if(player.reloadTimers[i] > 0) player.reloadTimers[i]--; });

  // Drone control
  const targetX = wx, targetY = wy;
  player.drones.forEach(d => {
    const da = Math.atan2(targetY - d.y, targetX - d.x);
    d.vx += Math.cos(da) * 0.6;
    d.vy += Math.sin(da) * 0.6;
    const sp = Math.sqrt(d.vx*d.vx+d.vy*d.vy);
    if(sp > 4) { d.vx *= 4/sp; d.vy *= 4/sp; }
    d.x += d.vx; d.y += d.vy;
  });
}

function fireTank(entity, cls, entityStats, statMults) {
  cls.barrels.forEach((b, i) => {
    if(entity.reloadTimers[i] > 0) return;
    if(b.delayTicks && (tick % ((b.delayTicks+1)*2)) < b.delayTicks) return;

    let reload = b.reload;
    if(entityStats) reload = Math.max(3, reload + reload * getStatMult(6, entityStats[6]));
    if(statMults) reload *= statMults.reload;
    entity.reloadTimers[i] = Math.round(reload);

    const ang = entity.angle + b.angle + (Math.random()-0.5)*b.spread;
    const offX = b.offset ? Math.cos(entity.angle + Math.PI/2) * b.offset : 0;
    const offY = b.offset ? Math.sin(entity.angle + Math.PI/2) * b.offset : 0;

    let spd = b.speed;
    if(entityStats) spd += getStatMult(3, entityStats[3]);
    if(statMults) spd *= statMults.speed || 1;

    let dmg = b.damage;
    if(entityStats) dmg += getStatMult(5, entityStats[5]);
    if(statMults) dmg *= statMults.damage;

    let pen = b.pen;
    if(entityStats) pen += getStatMult(4, entityStats[4]);

    if(b.drone) {
      const maxD = b.maxDrones || 4;
      if(entity.drones.length >= maxD) return;
      const drone = {
        x: entity.x + offX + Math.cos(entity.angle + b.angle) * cls.bodySize,
        y: entity.y + offY + Math.sin(entity.angle + b.angle) * cls.bodySize,
        vx: Math.cos(ang) * 2, vy: Math.sin(ang) * 2,
        size: 12, hp: pen, damage: dmg, owner: entity,
        isPlayerBullet: entity === player, isDrone: true,
      };
      entity.drones.push(drone);
      bullets.push(drone);
      return;
    }

    const sz = (b.sizeF || 1) * 6;
    const bul = {
      x: entity.x + offX + Math.cos(entity.angle + b.angle) * (cls.bodySize + b.length * 0.6),
      y: entity.y + offY + Math.sin(entity.angle + b.angle) * (cls.bodySize + b.length * 0.6),
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      size: sz, hp: pen, damage: dmg, owner: entity,
      isPlayerBullet: entity === player, life: b.trap ? 300 : 80,
      trap: b.trap || false,
    };
    bullets.push(bul);

    // Recoil
    const recoil = (b.sizeF || 1) * 0.3;
    entity.vx -= Math.cos(ang) * recoil;
    entity.vy -= Math.sin(ang) * recoil;
  });
}

// ==================== ENEMY AI ====================
function updateEnemies() {
  enemies.forEach(e => {
    if(e.invuln > 0) e.invuln--;
    const cls = TANK_CLASSES[e.classId];
    if(!cls) return;
    e.aiTimer--;
    if(e.aiTimer <= 0) {
      e.aiTimer = 60 + Math.floor(Math.random()*60);
      // Find target
      let closest = null, closestD = 600;
      const dx = player.x - e.x, dy = player.y - e.y;
      const dp = Math.sqrt(dx*dx+dy*dy);
      if(dp < closestD) { closest = player; closestD = dp; }
      e.target = closest;
      if(!e.target) e.wanderAngle += (Math.random()-0.5)*1.5;
    }

    const spd = cls.speed * (e.statMults?.speed || 1) * 1.6;
    if(e.target) {
      const dx = e.target.x - e.x, dy = e.target.y - e.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      e.angle = Math.atan2(dy, dx);
      if(d > 100) {
        e.vx += (dx/d) * spd * 0.12;
        e.vy += (dy/d) * spd * 0.12;
      }
      fireTank(e, cls, null, e.statMults);
    } else {
      e.vx += Math.cos(e.wanderAngle) * spd * 0.05;
      e.vy += Math.sin(e.wanderAngle) * spd * 0.05;
      // Shoot food nearby
      let nearFood = null, nfd = 250;
      foods.forEach(f => {
        const d = Math.sqrt((f.x-e.x)**2 + (f.y-e.y)**2);
        if(d < nfd) { nfd = d; nearFood = f; }
      });
      if(nearFood) {
        e.angle = Math.atan2(nearFood.y - e.y, nearFood.x - e.x);
        fireTank(e, cls, null, e.statMults);
      }
    }

    e.vx *= 0.9; e.vy *= 0.9;
    e.x += e.vx; e.y += e.vy;
    e.x = Math.max(cls.bodySize, Math.min(WORLD_W - cls.bodySize, e.x));
    e.y = Math.max(cls.bodySize, Math.min(WORLD_H - cls.bodySize, e.y));

    cls.barrels.forEach((b, i) => { if(e.reloadTimers[i] > 0) e.reloadTimers[i]--; });

    // HP regen
    e.hp = Math.min(e.maxHp, e.hp + cls.hpRegen * 1.5);

    // Drone control for AI
    if(e.drones.length > 0) {
      const tx = e.target ? e.target.x : e.x + Math.cos(e.angle)*200;
      const ty = e.target ? e.target.y : e.y + Math.sin(e.angle)*200;
      e.drones.forEach(d => {
        const da = Math.atan2(ty - d.y, tx - d.x);
        d.vx += Math.cos(da) * 0.5;
        d.vy += Math.sin(da) * 0.5;
        const sp = Math.sqrt(d.vx*d.vx+d.vy*d.vy);
        if(sp > 3.5) { d.vx *= 3.5/sp; d.vy *= 3.5/sp; }
        d.x += d.vx; d.y += d.vy;
      });
    }
  });
}

// ==================== BULLETS ====================
function updateBullets() {
  for(let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if(b.isDrone) {
      if(b.hp <= 0) { bullets.splice(i,1); b.owner.drones = b.owner.drones.filter(d=>d!==b); continue; }
      continue;
    }
    if(b.trap) {
      b.vx *= 0.92; b.vy *= 0.92;
    }
    b.x += b.vx; b.y += b.vy;
    b.life--;
    if(b.life <= 0 || b.hp <= 0 || b.x < -50 || b.x > WORLD_W+50 || b.y < -50 || b.y > WORLD_H+50) {
      if(b.isDrone && b.owner) b.owner.drones = b.owner.drones.filter(d=>d!==b);
      bullets.splice(i, 1);
    }
  }
}

// ==================== FOOD ====================
function updateFoods() {
  foods.forEach(f => {
    f.vx *= 0.95; f.vy *= 0.95;
    f.x += f.vx; f.y += f.vy;
    f.angle += f.spin;
    f.x = Math.max(f.size, Math.min(WORLD_W-f.size, f.x));
    f.y = Math.max(f.size, Math.min(WORLD_H-f.size, f.y));
  });
}

function updateParticles() {
  for(let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life--;
    if(p.life <= 0) particles.splice(i, 1);
  }
}

// ==================== COLLISIONS ====================
function checkCollisions() {
  const cls = TANK_CLASSES[player.classId];
  const pSize = cls.bodySize;

  // Bullets vs food
  for(let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    for(let j = foods.length-1; j >= 0; j--) {
      const f = foods[j];
      const d = Math.sqrt((b.x-f.x)**2 + (b.y-f.y)**2);
      if(d < b.size + f.size) {
        f.hp -= b.damage;
        b.hp -= 1;
        f.vx += b.vx * 0.15; f.vy += b.vy * 0.15;
        addParticle(f.x, f.y, getColor(f.type));
        if(f.hp <= 0) {
          if(b.isPlayerBullet) addXP(f.xp);
          addParticle(f.x, f.y, getColor(f.type));
          foods.splice(j, 1);
          spawnFood();
        }
        if(b.hp <= 0) {
          if(b.isDrone && b.owner) b.owner.drones = b.owner.drones.filter(d=>d!==b);
          bullets.splice(i, 1);
          break;
        }
      }
    }
  }

  // Bullets vs player
  for(let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if(b.isPlayerBullet) continue;
    const d = Math.sqrt((b.x-player.x)**2 + (b.y-player.y)**2);
    if(d < b.size + pSize && player.invuln <= 0) {
      player.hp -= b.damage;
      b.hp -= 1;
      addParticle(player.x, player.y, COLORS.player);
      if(b.hp <= 0) {
        if(b.isDrone && b.owner) b.owner.drones = b.owner.drones.filter(d=>d!==b);
        bullets.splice(i, 1);
      }
      if(player.hp <= 0) { die(); return; }
    }
  }

  // Bullets vs enemies
  for(let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if(!b.isPlayerBullet) continue;
    for(let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      const ecls = TANK_CLASSES[e.classId];
      if(!ecls) continue;
      const d = Math.sqrt((b.x-e.x)**2 + (b.y-e.y)**2);
      if(d < b.size + ecls.bodySize && e.invuln <= 0) {
        e.hp -= b.damage;
        b.hp -= 1;
        addParticle(e.x, e.y, COLORS.enemy);
        if(e.hp <= 0) {
          addXP(e.level * 18 + 50);
          addParticle(e.x, e.y, COLORS.enemy);
          // Remove drones
          e.drones.forEach(dr => { const idx = bullets.indexOf(dr); if(idx>=0) bullets.splice(idx,1); });
          enemies.splice(j, 1);
          spawnEnemy();
        }
        if(b.hp <= 0) {
          if(b.isDrone && b.owner) b.owner.drones = b.owner.drones.filter(d=>d!==b);
          bullets.splice(i, 1);
          break;
        }
      }
    }
  }

  // Player body vs enemies
  enemies.forEach(e => {
    const ecls = TANK_CLASSES[e.classId];
    if(!ecls) return;
    const d = Math.sqrt((player.x-e.x)**2 + (player.y-e.y)**2);
    if(d < pSize + ecls.bodySize) {
      const bd = cls.bodyDamage + getStatMult(2);
      const ebd = ecls.bodyDamage * (e.statMults?.damage || 1);
      if(player.invuln <= 0) player.hp -= ebd * 0.3;
      e.hp -= bd * 0.3;
      // Push apart
      const ang = Math.atan2(player.y - e.y, player.x - e.x);
      player.vx += Math.cos(ang) * 3;
      player.vy += Math.sin(ang) * 3;
      e.vx -= Math.cos(ang) * 3;
      e.vy -= Math.sin(ang) * 3;
      if(e.hp <= 0) {
        addXP(e.level * 18 + 50);
        e.drones.forEach(dr => { const idx = bullets.indexOf(dr); if(idx>=0) bullets.splice(idx,1); });
        enemies.splice(enemies.indexOf(e), 1);
        spawnEnemy();
      }
      if(player.hp <= 0) die();
    }
  });

  // Player body vs food
  for(let j = foods.length-1; j >= 0; j--) {
    const f = foods[j];
    const d = Math.sqrt((player.x-f.x)**2 + (player.y-f.y)**2);
    if(d < pSize + f.size) {
      f.hp -= (cls.bodyDamage + getStatMult(2)) * 0.5;
      f.vx += (f.x-player.x)*0.2; f.vy += (f.y-player.y)*0.2;
      if(f.hp <= 0) {
        addXP(f.xp);
        foods.splice(j, 1);
        spawnFood();
      }
    }
  }
}

function getColor(type) {
  return type === 'square' ? COLORS.food1 : type === 'triangle' ? COLORS.food2 : type === 'pentagon' ? COLORS.food3 : COLORS.food4;
}

function addXP(amount) {
  player.xp += amount;
  score += amount;
  while(player.xp >= player.xpNeeded && player.level < MAX_LEVEL) {
    player.xp -= player.xpNeeded;
    player.level++;
    statPoints++;
    player.xpNeeded = Math.floor(player.xpNeeded * 1.18 + 5);
    player.maxHp = TANK_CLASSES[player.classId].maxHp + stats[1]*12;
    player.hp = player.maxHp;
    buildClassUI();
    updateStatUI();
  }
}

function die() {
  playing = false;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('upgradePanel').style.display = 'none';
  document.getElementById('classPanel').style.display = 'none';
  document.getElementById('scoreDisplay').style.display = 'none';
  document.getElementById('classLabel').style.display = 'none';
  document.getElementById('minimap').style.display = 'none';
  document.getElementById('deathScreen').style.display = 'flex';
  document.getElementById('finalScore').textContent = `Score: ${score.toLocaleString()}`;
  // Clean up drones
  player.drones.forEach(dr => { const idx = bullets.indexOf(dr); if(idx>=0) bullets.splice(idx,1); });
}

function maintainPopulation() {
  while(foods.length < 250) spawnFood();
  while(enemies.length < 18) spawnEnemy();
}

function updateCamera() {
  const cls = TANK_CLASSES[player.classId];
  const fov = cls.fov || 1;
  const targetZoom = 0.85 / fov;
  camera.x += (player.x - camera.x) * 0.08;
  camera.y += (player.y - camera.y) * 0.08;
  camera.zoom += (targetZoom - camera.zoom) * 0.05;
}

// ==================== DRAWING ====================
function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

  drawGrid();
  drawFoods();
  drawBullets();
  drawEnemies();
  drawPlayer();
  drawParticles();

  ctx.restore();
}

function drawGrid() {
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 1;
  const l = camera.x - W/2/camera.zoom, r = camera.x + W/2/camera.zoom;
  const t = camera.y - H/2/camera.zoom, b = camera.y + H/2/camera.zoom;
  const sx = Math.floor(l/GRID_SIZE)*GRID_SIZE;
  const sy = Math.floor(t/GRID_SIZE)*GRID_SIZE;
  ctx.beginPath();
  for(let x=sx; x<=r; x+=GRID_SIZE) { ctx.moveTo(x, Math.max(0,t)); ctx.lineTo(x, Math.min(WORLD_H,b)); }
  for(let y=sy; y<=b; y+=GRID_SIZE) { ctx.moveTo(Math.max(0,l), y); ctx.lineTo(Math.min(WORLD_W,r), y); }
  ctx.stroke();

  // World border
  ctx.strokeStyle = 'rgba(0,0,0,.15)';
  ctx.lineWidth = 4;
  ctx.strokeRect(0, 0, WORLD_W, WORLD_H);
}

function drawFoods() {
  foods.forEach(f => {
    if(!onScreen(f.x, f.y, 50)) return;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.angle);
    ctx.fillStyle = getColor(f.type);
    ctx.strokeStyle = darken(getColor(f.type));
    ctx.lineWidth = 2.5;

    if(f.type === 'square') drawPoly(4, f.size, Math.PI/4);
    else if(f.type === 'triangle') drawPoly(3, f.size, -Math.PI/2);
    else if(f.type === 'pentagon') drawPoly(5, f.size, -Math.PI/2);
    else drawPoly(6, f.size, 0);

    ctx.fill(); ctx.stroke();

    // HP bar
    if(f.hp < f.maxHp) drawHpBar(0, f.size + 8, f.size * 1.4, f.hp, f.maxHp);

    ctx.restore();
  });
}

function drawPoly(sides, radius, startAngle) {
  ctx.beginPath();
  for(let i=0; i<sides; i++) {
    const a = startAngle + (i/sides)*Math.PI*2;
    ctx.lineTo(Math.cos(a)*radius, Math.sin(a)*radius);
  }
  ctx.closePath();
}

function drawTank(x, y, angle, classId, color, size, alpha) {
  const cls = TANK_CLASSES[classId];
  if(!cls) return;
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = alpha || 1;

  // Barrels
  cls.barrels.forEach(b => {
    ctx.save();
    ctx.rotate(angle + b.angle);
    const ox = b.offset || 0;
    ctx.fillStyle = COLORS.barrel;
    ctx.strokeStyle = '#777';
    ctx.lineWidth = 2;
    const bw = b.width, bl = b.length;
    ctx.fillRect(0, -bw/2 + (b.offset ? 0 : 0), bl, bw);
    ctx.strokeRect(0, -bw/2, bl, bw);
    if(b.offset) {
      ctx.restore();
      ctx.save();
      ctx.rotate(angle + b.angle);
      ctx.translate(0, b.offset);
      ctx.fillStyle = COLORS.barrel;
      ctx.strokeStyle = '#777';
      ctx.lineWidth = 2;
      // Already drawn offset above, skip
    }
    ctx.restore();
  });

  // Handle offset barrels properly
  cls.barrels.forEach(b => {
    if(!b.offset) return;
    ctx.save();
    ctx.rotate(angle + b.angle);
    ctx.fillStyle = COLORS.barrel;
    ctx.strokeStyle = '#777';
    ctx.lineWidth = 2;
    ctx.fillRect(0, b.offset - b.width/2, b.length, b.width);
    ctx.strokeRect(0, b.offset - b.width/2, b.length, b.width);
    ctx.restore();
  });

  // Body
  const bs = size || cls.bodySize;
  ctx.fillStyle = color;
  ctx.strokeStyle = darken(color);
  ctx.lineWidth = 3;

  if(cls.smasher) {
    // Smasher ring
    ctx.save();
    ctx.rotate(angle + tick * 0.02);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 4;
    drawPoly(6, bs + 6, 0);
    ctx.stroke();
    ctx.restore();
  }
  if(cls.spike) {
    ctx.save();
    ctx.rotate(angle + tick * 0.02);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3;
    for(let i = 0; i < 12; i++) {
      const a = (i/12)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*bs*0.8, Math.sin(a)*bs*0.8);
      ctx.lineTo(Math.cos(a)*(bs+10), Math.sin(a)*(bs+10));
      ctx.stroke();
    }
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(0, 0, bs, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  ctx.restore();
}

function drawPlayer() {
  const cls = TANK_CLASSES[player.classId];
  const alpha = player.invuln > 0 ? 0.5 + Math.sin(tick*0.3)*0.3 : 1;
  drawTank(player.x, player.y, player.angle, player.classId, COLORS.player, cls.bodySize, alpha);

  // Name
  ctx.fillStyle = '#333';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(player.name, player.x, player.y - cls.bodySize - 18);
  ctx.fillStyle = '#666';
  ctx.font = '11px sans-serif';
  ctx.fillText(`Lv ${player.level} ${TANK_CLASSES[player.classId].name}`, player.x, player.y - cls.bodySize - 6);

  // HP bar
  if(player.hp < player.maxHp) drawHpBar(player.x, player.y + cls.bodySize + 10, 40, player.hp, player.maxHp);
}

function drawEnemies() {
  enemies.forEach(e => {
    if(!onScreen(e.x, e.y, 80)) return;
    const ecls = TANK_CLASSES[e.classId];
    if(!ecls) return;
    drawTank(e.x, e.y, e.angle, e.classId, COLORS.enemy, ecls.bodySize, 1);

    ctx.fillStyle = '#333';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(e.name, e.x, e.y - ecls.bodySize - 16);
    ctx.fillStyle = '#777';
    ctx.font = '10px sans-serif';
    ctx.fillText(`Lv ${e.level} ${ecls.name}`, e.x, e.y - ecls.bodySize - 5);

    if(e.hp < e.maxHp) drawHpBar(e.x, e.y + ecls.bodySize + 10, 36, e.hp, e.maxHp);
  });
}

function drawBullets() {
  bullets.forEach(b => {
    if(!onScreen(b.x, b.y, 30)) return;
    const color = b.isPlayerBullet ? COLORS.player : COLORS.enemy;
    ctx.fillStyle = color;
    ctx.strokeStyle = darken(color);
    ctx.lineWidth = 2;
    if(b.trap) {
      ctx.save();
      ctx.translate(b.x, b.y);
      drawPoly(3, b.size * 1.3, -Math.PI/2);
      ctx.fill(); ctx.stroke();
      ctx.restore();
    } else if(b.isDrone) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(Math.atan2(b.vy, b.vx));
      drawPoly(3, b.size, 0);
      ctx.fill(); ctx.stroke();
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
    }
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life/p.maxLife), 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawHpBar(x, y, w, hp, maxHp) {
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.fillRect(x - w, y, w * 2, 5);
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(x - w, y, w * 2 * Math.max(0, hp/maxHp), 5);
}

function onScreen(x, y, margin) {
  const sx = (x - camera.x) * camera.zoom + W/2;
  const sy = (y - camera.y) * camera.zoom + H/2;
  return sx > -margin && sx < W + margin && sy > -margin && sy < H + margin;
}

function darken(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.floor(r*0.7)},${Math.floor(g*0.7)},${Math.floor(b*0.7)})`;
}

// ==================== MINIMAP ====================
function drawMinimap() {
  mmCtx.fillStyle = 'rgba(200,200,200,.6)';
  mmCtx.fillRect(0, 0, 140, 140);
  const s = 140 / WORLD_W;

  // Food dots
  mmCtx.fillStyle = 'rgba(180,180,180,.5)';
  foods.forEach(f => {
    mmCtx.fillRect(f.x*s, f.y*s, 1.5, 1.5);
  });

  // Enemies
  mmCtx.fillStyle = COLORS.enemy;
  enemies.forEach(e => {
    mmCtx.beginPath();
    mmCtx.arc(e.x*s, e.y*s, 2.5, 0, Math.PI*2);
    mmCtx.fill();
  });

  // Player
  mmCtx.fillStyle = COLORS.player;
  mmCtx.beginPath();
  mmCtx.arc(player.x*s, player.y*s, 3.5, 0, Math.PI*2);
  mmCtx.fill();

  // Viewport rect
  mmCtx.strokeStyle = 'rgba(0,0,0,.3)';
  mmCtx.lineWidth = 1;
  const vw = W / camera.zoom * s, vh = H / camera.zoom * s;
  mmCtx.strokeRect(camera.x*s - vw/2, camera.y*s - vh/2, vw, vh);
}

// ==================== HUD ====================
function updateHUD() {
  const pct = player.level >= MAX_LEVEL ? 100 : (player.xp / player.xpNeeded * 100);
  document.getElementById('xpBar').style.width = pct + '%';
  document.getElementById('scoreDisplay').textContent = `Score: ${score.toLocaleString()}`;
  document.getElementById('classLabel').textContent = TANK_CLASSES[player.classId].name;
  document.getElementById('hudLevel').textContent = `Lv ${player.level} | ${statPoints} pts`;
}

// ==================== BARREL OFFSET FIX ====================
// Redraw barrels that have offsets properly - already handled above

// ==================== START ====================
gameLoop();
</script>
